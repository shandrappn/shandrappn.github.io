<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAF Culture Simulator - Pro Edition</title>
    <style>
        :root { --primary: #2c3e50; --accent: #c0392b; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* Login Overlay */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .login-box { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 10px; backdrop-filter: blur(5px); }

        /* Header & Stats */
        header { background: var(--primary); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; background: #eee; }
        .stat-card { background: white; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .progress-bg { background: #ddd; height: 12px; border-radius: 6px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 50%; transition: width 0.8s ease; background: #27ae60; }

        /* Main Game Area */
        #game-area { padding: 30px; }
        #story-text { font-size: 1.15rem; line-height: 1.6; min-height: 150px; margin-bottom: 25px; border-left: 4px solid var(--accent); padding-left: 20px; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        button { padding: 15px; border: none; border-radius: 6px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: var(--accent); }
        button:disabled { background: #ccc; }

        /* Log Section */
        #history-log { margin-top: 30px; padding: 20px; border-top: 1px solid #ddd; font-size: 0.9rem; color: #666; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1>CAF Culture Evolution</h1>
        <p>Enter Service Number or Name to begin</p>
        <input type="text" id="user-id" style="padding: 10px; width: 80%; border-radius: 4px; border: none; margin-bottom: 20px;" placeholder="e.g. A123 456 789">
        <br>
        <button onclick="startGame()" style="background: var(--accent); width: 85%;">Access Simulation</button>
    </div>
</div>

<div class="container hidden" id="main-container">
    <header>
        <div><strong>User:</strong> <span id="display-user"></span></div>
        <div id="api-status" style="font-size: 0.8rem; background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 4px;">Groq API Ready</div>
    </header>

    <div style="padding: 10px 20px;">
        <input type="password" id="api-key" placeholder="Enter Groq API Key (gsk_...)" style="width: 100%; padding: 8px; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc;">
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <strong>Culture Health: <span id="culture-val">50</span>%</strong>
            <div class="progress-bg"><div id="culture-bar" class="progress-fill"></div></div>
        </div>
        <div class="stat-card">
            <strong>Unit Readiness: <span id="readiness-val">80</span>%</strong>
            <div class="progress-bg"><div id="readiness-bar" class="progress-fill" style="background: #2980b9;"></div></div>
        </div>
    </div>

    <div id="game-area">
        <div id="story-text">Loading initial scenario...</div>
        <div class="btn-group">
            <button class="choice-btn" onclick="makeChoice('Direct Confrontation', 15, -5)">A: Direct Confrontation</button>
            <button class="choice-btn" onclick="makeChoice('Indirect Mentorship', 5, 5)">B: Indirect Mentorship</button>
            <button class="choice-btn" onclick="makeChoice('Ignore/Deferred', -20, 0)">C: Ignore / Deferred Action</button>
        </div>
    </div>

    <div id="history-log">
        <strong>Session Log:</strong>
        <ul id="log-list"></ul>
    </div>
    
    <div style="text-align: center; padding-bottom: 20px;">
        <button onclick="resetData()" style="background: #999; font-size: 0.7rem;">Reset User Progress</button>
    </div>
</div>

<script>
    let state = {
        user: "",
        culture: 50,
        readiness: 80,
        history: []
    };

    function startGame() {
        const id = document.getElementById('user-id').value;
        if (!id) return alert("Identification required.");
        
        state.user = id;
        document.getElementById('display-user').innerText = id;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-container').classList.remove('hidden');

        // Check for existing progress
        const saved = localStorage.getItem('caf_sim_' + id);
        if (saved) {
            state = JSON.parse(saved);
            updateUI();
            logAction("Resumed session.");
        } else {
            initScenario();
        }
    }

    function updateUI() {
        document.getElementById('culture-val').innerText = state.culture;
        document.getElementById('culture-bar').style.width = state.culture + "%";
        document.getElementById('readiness-val').innerText = state.readiness;
        document.getElementById('readiness-bar').style.width = state.readiness + "%";
        
        // Save to local storage
        localStorage.setItem('caf_sim_' + state.user, JSON.stringify(state));
    }

    function logAction(msg) {
        const list = document.getElementById('log-list');
        const item = document.createElement('li');
        item.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        list.prepend(item);
        state.history.push(msg);
    }

    async function makeChoice(label, cDelta, rDelta) {
        const apiKey = document.getElementById('api-key').value.trim();
        if(!apiKey) return alert("Please enter your Groq API Key.");

        state.culture = Math.min(100, Math.max(0, state.culture + cDelta));
        state.readiness = Math.min(100, Math.max(0, state.readiness + rDelta));
        updateUI();
        logAction(`User chose: ${label}`);

        const btns = document.querySelectorAll('.choice-btn');
        btns.forEach(b => b.disabled = true);
        document.getElementById('story-text').innerText = "AI generating cultural ripple effects...";

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: [
                        {role: "system", content: "You are a CAF leadership coach. Analyze the user's choice and provide a short consequence and then a NEW Episode/Scenario. Format: ANALYSIS: [text] NEXT: [text]"},
                        {role: "user", content: `Choice: ${label}. Culture: ${state.culture}%. Readiness: ${state.readiness}%.`}
                    ]
                })
            });

            const data = await response.json();
            const aiText = data.choices[0].message.content;
            
            document.getElementById('story-text').innerHTML = aiText.replace(/\n/g, '<br>');
            logAction("AI response received.");
        } catch (e) {
            alert("Connection Error: " + e.message);
        } finally {
            btns.forEach(b => b.disabled = false);
        }
    }

    function initScenario() {
        document.getElementById('story-text').innerText = "Episode 1: You overhear a senior member using exclusive, derogatory language in the Mess. Junior members are clearly uncomfortable but silent. What is your move?";
    }

    function resetData() {
        if(confirm("Clear all progress for this user?")) {
            localStorage.removeItem('caf_sim_' + state.user);
            location.reload();
        }
    }
</script>

</body>
</html>
